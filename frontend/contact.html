<!DOCTYPE html>
<html>
<head>
  <title>Internal Marks Management</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0b5d1e, #f1c40f);
      color: white;
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 40px;
      background: rgba(0,0,0,0.25);
    }

    .nav-links a {
      margin-left: 20px;
      color: white;
      text-decoration: none;
    }

    .main-title {
      text-align: center;
      margin-top: 20px;
      font-size: 26px;
      font-weight: 600;
    }

    .sub-title {
      text-align: center;
      margin-bottom: 20px;
      font-size: 18px;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
    }

    .card {
      background: white;
      color: #333;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 6px;
      background: #27ae60;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="navbar">
  <h2>📊 Internal Marks Management</h2>
  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
</div>

<div class="main-title">Internal Marks Management</div>
<div class="sub-title">Contact Us</div>

<div class="container">
  <div class="card">

    <h2>Get in Touch</h2>

    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea rows="4" placeholder="Your Message"></textarea>

    <button>Send Message</button>

  </div>
</div>

</body>
</html>
